<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正则表达式使用</title>
</head>
<body>
    <script>
        // 正则表达式的语法
        let str = '我喜欢小轩轩，小轩轩非常的迷人！'
        // 定义规则
        const reg = /小轩轩/
        // 利用规则查找
        console.log(reg.test(str))   // 返回的是布尔值
        
    </script>
</body>
</html>
