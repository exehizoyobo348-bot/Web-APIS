<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>克隆节点和删除节点</title>
</head>
<body>
    <ul>
        <li>1</li>
        <li>2</li>
        <li>3</li>
        <li>没用了</li>
    </ul>
    <script>
        // 以下为克隆节点
        // 获取元素
        const ul = document.querySelector('ul')
        // 克隆元素
        const li1 = ul.children[0].cloneNode(true)
        // 追加元素
        ul.appendChild(li1)

        // 删除元素：父元素.removeChlid(子元素)
        ul.removeChild(ul.children[3])
    </script>
</body>
</html>
