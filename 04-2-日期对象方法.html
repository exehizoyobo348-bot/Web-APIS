<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日期对象方法</title>
    <style>
        div {
            width: 230px;
            height: 40px;
            border: 1px solid #000;
            line-height: 40px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div></div>
    
    <script>
        const div = document.querySelector('div')
        setInterval(function () {
            const date = new Date()
            let h = date.getHours()
            let m = date.getMinutes()
            let s = date.getSeconds()
            h = h >= 10 ? h : '0' + h
            m = m >= 10 ? m : '0' + m
            s = s >= 10 ? s : '0' + s
            div.innerHTML = `时间：${date.getFullYear()}-${date.getMonth() + 1}-${date.getDate()}  ${h}: ${m}: ${s}`
        }, 1000)

    </script>      
</body>
</html>
