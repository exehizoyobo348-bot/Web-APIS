<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实战案例</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        li {
            list-style: none;
        }

        .box {
            position: relative;
            width: 1200px;
            height: 500px;
            background-color: #f3f3f3;
        }

        .wrapper {
            width: 990px;
            height: 450px;
            position: absolute;
            position: relative;
            display: flex;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .left {
            position: relative;
            top: 0;
            left: 0;
            margin-right: 10px;
            width: 450px;
            height: 450px;
            /* background-color: green; */
        }

        .right {
            width: 80px;
            height: 400px;
            /* background-color: yellow; */
        }

        ul {
            width: 80px;
            height: 400px;
        }

        .right li {
            cursor: pointer;
            width: 80px;
            height: 80px;
            margin-bottom: 12.5px;
            /* background-color: red; */
            text-align: center;
            /* padding-top: 1px; */
        }

        li img {
            width: 76px;
            height: 76px;
        }

        .right .active {
            border: 2px solid #65c2ab;
        }

        .large {
            position: absolute;
            left: 460px;
            width: 450px;
            height: 450px;
            background-image: url(./images/19.jpg);
            background-color: yellow;
            background-repeat: no-repeat;
            background-position: center;
            background-size: 1350px 1350px;
        }

        .left .zz {
            width: 150px;
            height: 150px;
            position: absolute;
            top: 0;
            left: 0;
            background-color: rgba(0, 0, 0, 0.3);
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="wrapper">
            <!-- 左边大图 -->
            <div class="left">
                <img src="./images/19.jpg" alt="" width="450px" height="450px">
                <div class="zz" style="display: none;"></div>
            </div>

            <!-- 右边小图 -->
            <div class="right">
                <ul>
                    <li class="active"><img src="./images/19.jpg"></li>
                    <li><img src="./images/17.png"></li>
                    <li><img src="./images/3.png"></li>
                    <li><img src="./images/6.png"></li>
                    <li><img src="./images/5.png"></li>
                </ul>
            </div>

            <!-- 右边大图 -->
            <div class="large" style="display: none;">

            </div>
        </div>
    </div>
    
    <script>
        const lefts = document.querySelector('.left')
        const right = document.querySelector('.right')
        const large = document.querySelector('.large')
        // 1.小图切换
        right.addEventListener('mouseover', function (e) {
            if (e.target.tagName === 'IMG') {
                // 移除类
                right.querySelector('.active').classList.remove('active')

                // 为当前元素添加类
                e.target.parentNode.classList.add('active')

                // 让中等盒子的src地址变成小盒子中图片的src
                lefts.querySelector('img').src = e.target.src

                // 大盒子更换背景图片
                large.style.backgroundImage = `url(${e.target.src})`
            }
        })

        // 2.放大镜效果
        // 2.1 包装一个隐藏函数
        lefts.addEventListener('mouseenter', show)
        lefts.addEventListener('mouseleave', live)
        let timeID = 0
        large.addEventListener('mouseenter', show)
        large.addEventListener('mouseleave', live)
        
        function show() {
            clearTimeout(timeID)
            large.style.display = 'block'      
        }

        function live() {
            timeID = setTimeout(function () {
                large.style.display = 'none'
            }, 200)
        }

        // 2.2 鼠标进入中等盒子，显示遮罩
        const zz = document.querySelector('.left .zz')
        lefts.addEventListener('mouseenter', function () {
            zz.style.display = 'block'
        })

        lefts.addEventListener('mouseleave', function () {
            zz.style.display = 'none'
        })

        // 3 让遮罩跟着鼠标移动
        // 3.1 获取鼠标在页面中的坐标
        lefts.addEventListener('mousemove', function (e) {
            // 鼠标在left盒子中的坐标 = 鼠标在页面中的坐标 - 盒子左上角在页面中的坐标
            let x = e.pageX - lefts.getBoundingClientRect().left
            let y = e.pageY - lefts.getBoundingClientRect().top - document.documentElement.scrollTop
            if (x >= 0 && x <= 450 && y >= 0 && y <= 450) {
                let mx = 0
                let my = 0
                if (x < 75) mx = 0
                if (x >= 75 && x <= 375) mx = x - 75
                if (x > 375) mx = 300
                zz.style.left = mx + 'px'
                
                if (y <= 75) my = 0
                if (y > 75 && y <= 375) my = y - 75
                if (y > 375) my = 300
                zz.style.top = my + 'px'

                // 大盒子的背景图片要跟随  中等盒子移动  存在的关系是2倍
                large.style.backgroundPositionX = -3*mx + 'px'
                large.style.backgroundPositionY = -3*my + 'px'
            }
        })
    </script>
</body>
</html>
