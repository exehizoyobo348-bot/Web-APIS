<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>location对象</title>
</head>
<body>
    <a href="https://github.com/">将在5秒后跳转到首页</a>
    <script>
        const a = document.querySelector('a')
        let n = 5
        let dsj = setInterval(function () {
           n--
           a.innerHTML = `将在${n}秒后跳转到首页`
           if(n === 0) {
            clearInterval(dsj)
            location.href = 'https://github.com/'
           }
        }, 1000)
    </script>
</body>
</html>
