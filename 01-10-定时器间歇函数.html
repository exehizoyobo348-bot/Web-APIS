<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>定时器</title>
</head>
<body>
    <button></button>

    <script>
        const btn= document.querySelector('button')
        btn.disabled = true

        let i = 60
        let sum = setInterval(function () {
            i--
            btn.innerHTML = `已阅读用户协议 （${i}）`

            if(i === 0) {
                clearInterval(sum)
                btn.disabled = false
                btn.innerHTML = '同意并继续'
            }
        }, 1000)
    </script>
</body>
</html>
