<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>焦点事件</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        li {
            list-style: none;
        }

        .xl {
            width: 200px;
            height: 210px;
            /* background-color: skyblue; */
        }

        .xl input {
            width: 200px;
            height: 30px;
        }

        input::placeholder {
            padding-left: 8px;
        }

        .xl ul {
            display: none;
            width: 200px;
        }

        .xl ul li {
            height: 30px;
            /* background-color: yellow; */
            margin-bottom: 5px;
        }

        
    </style>
</head>
<body>
    <div class="xl">
        <input type="text" placeholder="乐呵呵">
        <ul>
            <li>六六六</li>
            <li>凑几把</li>
            <li>笑呵呵</li>
            <li>哈哈哈</li>
            <li>不错哦</li>
        </ul>
    </div>

    <script>
        const input = document.querySelector('.xl input')
        const ul = document.querySelector('.xl ul')
        input.addEventListener('focus', function () {
            ul.style.display = 'block'
        })

        input.addEventListener('blur', function () {
            ul.style.display = 'none'
        })
    </script>
</body>
</html>
