<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>延时函数</title>
</head>
<body>
    
    <script>
        // settimeout是开启延时函数   cleartimeout为清除延时函数
        setTimeout(function () {
            document.write('时间到了')
        }, 2000)


    </script>
</body>
</html>
