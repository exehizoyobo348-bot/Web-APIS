<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自定义属性</title>
</head>
<body>
    <div data-id="3" data-src="我不知道">1</div>
    <div data-id="2">2</div>
    <div data-id="1">3</div>
    <div data-id="5">4</div>
    <div data-id="4">5</div>

    <script>
        const div = document.querySelector('div')
        console.log(div.dataset.id);
        console.log(div.dataset.src);
        
    </script>
</body>
</html>
